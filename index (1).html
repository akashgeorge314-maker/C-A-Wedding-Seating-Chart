  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');

            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();

              chunks.push(value);

      // and tear down the wrapper. Non-# links navigate the parent to the

      // when the id is one of this bundle's own pages (author #/… links from

      // the user to the entry page); plain #frag scrolls in place.

            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +

              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +

      // ids) before wrapping — same escape level as every sibling JSON island.

        headContent.split('</' + 'script').join('<\\/' + 'script') +

    }

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per

        for (const a of old.attributes) s.setAttribute(a.name, a.value);

        // which transformScriptTags handles unconditionally.

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    navigate();

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

3 22 C45.5 18.5 45.5 17 43 14 C40.5 17 40.5 18.5 43 22 Z\" fill=\"#c9a25a\"><\u002Fpath>\n        <path d=\"M34 13 C37.5 10.5 39 10.5 42 13 C39 15.5 37.5 15.5 34 13 Z\" fill=\"#d8b876\"><\u002Fpath>\n        <path d=\"M52 13 C48.5 10.5 47 10.5 44 13 C47 15.5 48.5 15.5 52 13 Z\" fill=\"#d8b876\"><\u002Fpath>\n        <circle cx=\"43\" cy=\"13\" r=\"2.6\" fill=\"#b7892f\"><\u002Fcircle>\n      <\u002Fsvg>\n      <span style=\"{{ lineRightStyle }}\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"{{ dateStyle }}\">06.28.2026<\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"{{ stickyStyle }}\">\n    <div style=\"max-width:520px; margin:0 auto; position:relative;\">\n      <svg style=\"position:absolute; left:18px; top:50%; transform:translateY(-50%); pointer-events:none;\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ iconStroke }}\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4\"><\u002Fpath><\u002Fsvg>\n      <input value=\"{{ query }}\" oninput=\"{{ onInput }}\" type=\"text\" placeholder=\"Type your name to find your table…\" style=\"{{ inputStyle }}\" style-focus=\"border-color:#c9a25a; box-shadow:0 6px 24px rgba(201,162,90,0.18);\">\n      <div style=\"{{ statusStyle }}\">{{ statusText }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <main style=\"position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:8px 16px 0;\">\n    <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:14px;\" id=\"tableGrid\">\n      <sc-for list=\"{{ tables }}\" as=\"t\" hint-placeholder-count=\"20\">\n        <div ref=\"{{ t.ref }}\" style=\"{{ t.cardStyle }}\">\n          <div style=\"{{ t.headStyle }}\">\n            <span style=\"{{ t.labelStyle }}\">Table<\u002Fspan>\n            <span style=\"{{ t.numStyle }}\">{{ t.num }}<\u002Fspan>\n          <\u002Fdiv>\n          <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px;\">\n            <sc-for list=\"{{ t.guests }}\" as=\"g\" hint-placeholder-count=\"9\">\n              <li style=\"{{ g.style }}\">{{ g.name }}<\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: 720 },\n  &quot;palette&quot;: {\n    &quot;editor&quot;: &quot;enum&quot;,\n    &quot;options&quot;: [&quot;Lavender Romance&quot;, &quot;Blush Garden&quot;, &quot;Sage &amp; Gold&quot;],\n    &quot;default&quot;: &quot;Lavender Romance&quot;,\n    &quot;tsType&quot;: &quot;string&quot;\n  },\n  &quot;cardTheme&quot;: {\n    &quot;editor&quot;: &quot;enum&quot;,\n    &quot;options&quot;: [&quot;Soft White&quot;, &quot;Warm Vellum&quot;, &quot;Airy Linen&quot;],\n    &quot;default&quot;: &quot;Soft White&quot;,\n    &quot;tsType&quot;: &quot;string&quot;\n  },\n  &quot;florals&quot;: {\n    &quot;editor&quot;: &quot;enum&quot;,\n    &quot;options&quot;: [&quot;Lush&quot;, &quot;Subtle&quot;, &quot;Hidden&quot;],\n    &quot;default&quot;: &quot;Lush&quot;,\n    &quot;tsType&quot;: &quot;string&quot;\n  }\n}\">\nclass Component extends DCLogic {\n  state = { query: \"\" };\n\n  data = [\n    [\"Varghese Kurian\",\"Jency Kurian\",\"Mathews Kurien\",\"Ancy Mathews\",\"Varghese Baby Mathew\",\"Alvin Mathews\",\"Jonathan John\",\"Jacob John\",\"Asher Kurian\",\"Abel Kurian\"],\n    [\"Shaju George\",\"Bindhu George\",\"Sheeba George\",\"Giju George\",\"Binu Cloud\",\"Priya George\",\"Nishan George\",\"Aneela George\"],\n    [\"Yohannan George\",\"Leelamma George\",\"Varghese Mathew\",\"Rachel Mathew\",\"Lukose Thomaskutty\",\"Saramma Thomaskutty\",\"Smitha John\",\"Jijo John\",\"Joanna John\",\"Angelia Kurian\"],\n    [\"Sneha Varughese\",\"Rijo Varughese\",\"Isaiah Varughese\",\"Emma Grace Varughese\",\"Akshay Mathew\",\"Jennifer Mathew\",\"Eleanor Mathew\",\"Roshiny Mathew\",\"Ezra Mathew\",\"Abigail Varughese\"],\n    [\"Blessy Varghese\",\"Rejil Varghese\",\"Ginu George\",\"Riya George\",\"Isaac George\",\"Ann George\",\"Nithya Varghese\",\"Sneha Varghese\",\"Bindu Varghese\",\"Ginu Varghese\"],\n    [\"Ammini Varughese\",\"Susy George\",\"Robin George\",\"Annie Mammen\",\"Thomas Mammen\",\"Lizy Samuel\",\"Daniel Samuel\",\"Stanley Samuel\"],\n    [\"Tashi Gotlieb\",\"Nihal Singh\",\"Eric Chen\",\"Alex Song\",\"Malia Sanghvi\",\"Abraham Franchetti\",\"Alex Jehseok Kim\",\"Anna Li\",\"Anais Lee\",\"Nina Wang\"],\n    [\"Cassidy Casabona\",\"Anna Chen\",\"Irene Kim\",\"Arjun Khanna\",\"Shreya Jadhav\",\"Kelly Hu\",\"Cissy Wang\",\"Neo Matsuyama\",\"Jeongha Kim\"],\n    [\"Cyrus Chan\",\"Hanmo Yang\",\"Dylan Minarto\",\"Angela Ying\",\"Sofia Sherburne\",\"Julian Mola\",\"Claire Lee\",\"Kirill Solovyev\",\"Bella Bock\",\"Katie Ross\"],\n    [\"Ken Surjadinata\",\"Amy Nguyen\",\"Sonia Ambegaonkar\",\"Ruth Le\",\"Jennifer Wang\",\"Steve Boyle\",\"Alex Mathew\",\"Trisha Mathew\"],\n    [\"Emily Won\",\"Joanna Lee\",\"Jacqueline Justiss\",\"Jenna Schemm\",\"Linda Schemm\",\"Angel Nguyen\",\"Sharon Kim\",\"Kristen Louis\",\"Kristin Joe\",\"Antonia Yang\"],\n    [\"Hayden Gold\",\"George Tian\",\"Teja Vankireddy\",\"Udit Mehta\",\"Steven Lee\",\"Roshan Pillai\",\"Suraj Sait\",\"Mo Foroutan\",\"Andrew Lee\",\"Michelle Chen\"],\n    [\"Sadat Chowdhury\",\"Rumana Chowdhury\",\"Umesh Mansukhani\",\"Namrata Mansukhani\",\"Viral Shah\",\"Priya Shah\",\"Sarju Desai\",\"Sejal Desai\"],\n    [\"Abraham Joseph\",\"Shirley Joseph\",\"Sunil Joseph\",\"Pheba Joseph\",\"Jerome Mammen\",\"Rani Mammen\",\"Justin Mammen\",\"Stephanie Mammen\",\"Jinsy Rogers\",\"Carl Rogers\"],\n    [\"Safoorah Syed\",\"Sajjad Syed\",\"Samir Patel\",\"Bhavini Patel\",\"Suganya Senthilkumar\",\"Senthil Arumugham\",\"Hitesh Patel\",\"Shivani Patel\",\"Tejroop Sehmi\",\"Rita Sehmi\"],\n    [\"Daniel Chou\",\"Ivan Wu\",\"Brady Xie\",\"Brian Hsu\",\"Victor Yeung\",\"Andrew Garcia\",\"Jesse Dong\",\"Allen Wang\",\"Kathryn Guh\",\"Mandy Huang\"],\n    [\"Portia Chien\",\"Ryan Chien\",\"Kevin Quan\",\"Vanessa Quan\",\"Lily Quan\",\"Katie Peng\",\"Jolleen Mejia\",\"Daniel Min\",\"Kevin Lee\",\"Clarissa Ta\"],\n    [\"Allen Kong\",\"Jenny Kong\",\"Zoe Kong\",\"Eason Kong\",\"Diana Kong\",\"Kristie Bhat\",\"Vinay Bhat\",\"Riley Bhat\",\"Liane Ho\",\"Wesley You\"],\n    [\"Mary Calderon\",\"Jason Cheng\",\"Canaan Matsunaga\",\"Kayley Kong\",\"Matthew Kong\",\"Megan Kong\",\"Charlotte Kong\",\"Jason Chan\",\"Ernest Ho\",\"Camille Obata\"],\n    [\"Andy Wu\",\"Angel Wong\",\"Jimmy Kong\",\"Lai Kong\",\"Bob Kong\",\"Elaine Kong\",\"Stephen Ho\",\"Salina Ho\",\"Julie Chan\",\"Christopher Wu\"]\n  ];\n\n  refs = this.data.map(() => React.createRef());\n\n  PALETTES = {\n    \"Lavender Romance\": { bg1:\"#e7ddf3\", bg2:\"#e7ddf3\", ink:\"#6b5b85\", eyebrow:\"#a08bb5\", date:\"#8a7aa0\", line:\"#cdb8dd\", label:\"#a08bb5\", guest:\"#5a5163\", cardBorder:\"#efe7f4\", inputBorder:\"#e4d8ee\", sticky:\"246,241,248\", shadow:\"107,91,133\" },\n    \"Blush Garden\":     { bg1:\"#fbf0f1\", bg2:\"#f8f2ef\", ink:\"#9c5f6b\", eyebrow:\"#c58a96\", date:\"#b07a86\", line:\"#eccad1\", label:\"#c58a96\", guest:\"#6b545a\", cardBorder:\"#f2e2e5\", inputBorder:\"#f0d8dd\", sticky:\"251,240,241\", shadow:\"156,95,107\" },\n    \"Sage & Gold\":      { bg1:\"#eef2ec\", bg2:\"#f4f2ea\", ink:\"#4f6b54\", eyebrow:\"#7d9a82\", date:\"#6f8a72\", line:\"#c4d6c2\", label:\"#7d9a82\", guest:\"#515c52\", cardBorder:\"#e4ece1\", inputBorder:\"#d9e6d6\", sticky:\"238,242,236\", shadow:\"79,107,84\" }\n  };\n\n  componentDidMount() {\n    const apply = () => {\n      const cols = window.innerWidth >= 900 ? 4 : 2;\n      const grid = document.getElementById(\"tableGrid\");\n      if (grid) grid.style.gridTemplateColumns = `repeat(${cols},1fr)`;\n    };\n    apply();\n    this._apply = apply;\n    window.addEventListener(\"resize\", apply);\n  }\n\n  componentDidUpdate() { if (this._apply) this._apply(); }\n\n  onInput = (e) => {\n    const query = e.target.value;\n    this.setState({ query });\n    const q = query.trim().toLowerCase();\n    if (q.length < 2) return;\n    clearTimeout(this._t);\n    this._t = setTimeout(() => {\n      const idx = this.matchedTables(q)[0];\n      if (idx != null && this.refs[idx].current) {\n        const el = this.refs[idx].current;\n        const y = el.getBoundingClientRect().top + window.pageYOffset - 120;\n        window.scrollTo({ top: y, behavior: \"smooth\" });\n      }\n    }, 350);\n  };\n\n  norm(s) { return s.toLowerCase().replace(/[^a-z]/g, \"\"); }\n  fuzz(s) { return this.norm(s).replace(/(.)\\1+/g, \"$1\"); }\n\n  guestMatches(name, q) {\n    const tokens = name.toLowerCase().split(/\\s+/);\n    const nq = this.norm(q), fq = this.fuzz(q);\n    if (tokens.some(t => t.startsWith(q) || this.norm(t).startsWith(nq) || this.fuzz(t).startsWith(fq))) return true;\n    return this.norm(name).includes(nq) || this.fuzz(name).includes(fq);\n  }\n\n  matchedTables(q) {\n    const out = [];\n    this.data.forEach((g, i) => { if (g.some(n => this.guestMatches(n, q))) out.push(i); });\n    return out;\n  }\n\n  cardBase(kind, p, ct) {\n    const pad = ct === \"Warm Vellum\" ? \"20px 20px 22px\" : (ct === \"Airy Linen\" ? \"16px 16px 18px\" : \"18px 18px 20px\");\n    const radius = ct === \"Warm Vellum\" ? \"14px\" : (ct === \"Airy Linen\" ? \"4px\" : \"18px\");\n    let bg, border, shadow;\n    if (ct === \"Warm Vellum\") { bg = \"#fffdf8\"; border = \"none\"; shadow = `0 10px 30px rgba(${p.shadow},0.10)`; }\n    else if (ct === \"Airy Linen\") { bg = \"rgba(255,255,255,0.5)\"; border = `1px solid ${p.cardBorder}`; shadow = \"none\"; }\n    else { bg = \"#fff\"; border = `1px solid ${p.cardBorder}`; shadow = \"none\"; }\n\n    if (kind === \"glow\") {\n      return `background:${ct === \"Airy Linen\" ? \"#fffdf7\" : bg}; border-radius:${radius}; padding:${pad}; border:1px solid #e4c98a; transition:box-shadow .4s, transform .4s; animation:goldGlow 1.8s ease 2; box-shadow:0 0 0 3px rgba(201,162,90,0.4),0 12px 34px rgba(201,162,90,0.28); transform:translateY(-2px);`;\n    }\n    const base = `background:${bg}; border-radius:${radius}; padding:${pad}; border:${border}; box-shadow:${shadow}; transition:box-shadow .4s, transform .4s, border-color .4s, opacity .4s;`;\n    if (kind === \"dim\") return base + \" opacity:0.45;\";\n    return base + \" animation:floatUp .5s ease both;\";\n  }\n\n  renderVals() {\n    const p = this.PALETTES[this.props.palette] || this.PALETTES[\"Lavender Romance\"];\n    const ct = this.props.cardTheme || \"Soft White\";\n    const fl = this.props.florals || \"Lush\";\n    const floralOpacity = fl === \"Hidden\" ? 0 : (fl === \"Subtle\" ? 0.45 : 1);\n\n    const q = this.state.query.trim().toLowerCase();\n    const active = q.length >= 2;\n    const matchedSet = new Set(active ? this.matchedTables(q) : []);\n    let hitCount = 0;\n\n    const headStyle = `display:flex; align-items:baseline; gap:8px; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid ${p.cardBorder};`;\n    const labelStyle = `font-family:'Cormorant Garamond',serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:${p.label}; font-weight:600;`;\n    const numStyle = `font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:600; line-height:1; color:${p.ink};`;\n\n    const lastKey = (n) => { const t = n.trim().split(/\\s+/); return (t[t.length - 1] + \" \" + t.slice(0, -1).join(\" \")).toLowerCase(); };\n    const tables = this.data.map((rawGuests, i) => {\n      const guests = [...rawGuests].sort((a, b) => lastKey(a).localeCompare(lastKey(b)));\n      const isMatch = matchedSet.has(i);\n      const cardStyle = !active ? this.cardBase(\"base\", p, ct) : (isMatch ? this.cardBase(\"glow\", p, ct) : this.cardBase(\"dim\", p, ct));\n      const guestVals = guests.map(name => {\n        const hit = active && this.guestMatches(name, q);\n        if (hit) hitCount++;\n        const style = hit\n          ? \"font-size:15px; line-height:1.35; color:#7a5a18; font-weight:700; background:rgba(201,162,90,0.16); border-radius:6px; padding:2px 7px; margin:0 -3px;\"\n          : `font-size:15px; line-height:1.35; color:${p.guest}; font-weight:400; padding:2px 0;`;\n        return { name, style };\n      });\n      return { num: i + 1, guests: guestVals, cardStyle, headStyle, labelStyle, numStyle, ref: this.refs[i] };\n    });\n\n    let statusText = \"\";\n    if (active) {\n      const n = matchedSet.size;\n      if (n === 0) statusText = `No guests found for “${this.state.query.trim()}”`;\n      else if (hitCount === 1) statusText = `Found — you're at Table ${[...matchedSet][0] + 1}`;\n      else statusText = `${hitCount} matches across ${n} table${n > 1 ? \"s\" : \"\"}`;\n    }\n\n    return {\n      query: this.state.query, onInput: this.onInput, tables, statusText,\n      rootStyle: `position:relative; min-height:100vh; background:${p.bg1}; font-family:'Mulish',sans-serif; color:#4a4250; padding:0 0 64px; overflow:hidden;`,\n      floralLayerStyle: `position:absolute; inset:0; pointer-events:none; z-index:0; overflow:hidden; opacity:${floralOpacity}; transition:opacity .4s;`,\n      eyebrowStyle: `font-family:'Mulish',sans-serif; letter-spacing:0.32em; text-transform:uppercase; font-size:11px; color:${p.eyebrow}; font-weight:600; margin-bottom:14px;`,\n      h1Style: `font-family:'Cormorant Garamond',serif; font-weight:500; font-size:clamp(38px,9vw,64px); line-height:1.05; margin:0; color:${p.ink};`,\n      ampStyle: \"font-style:italic; color:#c9a25a;\",\n      lineLeftStyle: `flex:1; height:1px; background:linear-gradient(90deg,transparent,${p.line});`,\n      lineRightStyle: `flex:1; height:1px; background:linear-gradient(90deg,${p.line},transparent);`,\n      dateStyle: `font-family:'Cormorant Garamond',serif; font-size:22px; color:${p.date}; margin-top:12px; letter-spacing:0.18em;`,\n      stickyStyle: `position:sticky; top:0; z-index:20; padding:18px 16px; background:linear-gradient(180deg,rgba(${p.sticky},0.97) 70%,rgba(${p.sticky},0)); backdrop-filter:blur(4px);`,\n      iconStroke: \"#b29ac4\",\n      inputStyle: `width:100%; padding:16px 18px 16px 46px; font-family:'Mulish',sans-serif; font-size:16px; color:#4a4250; background:#fff; border:1.5px solid ${p.inputBorder}; border-radius:999px; outline:none; box-shadow:0 6px 22px rgba(${p.shadow},0.08);`,\n      statusStyle: `text-align:center; margin-top:10px; min-height:20px; font-size:14px; color:${p.date};`\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Seating Chart.dc"}
